interface:
  display_name: "Repo Task Proof Loop"
  short_description: "Init repo-local task artifacts, install role-specific subagents, and drive spec → build → evidence → verify → fix loops."
  default_prompt: "Use repo-task-proof-loop for TASK_ID <TASK_ID> in this repository. If .agent/tasks/<TASK_ID>/ does not exist, first run only init <TASK_ID> and wait for it to finish. Confirm .agent/tasks/<TASK_ID>/spec.md exists before spawning subagents or starting freeze/build/evidence/verify/fix. Then continue with the next workflow step."
policy:
  allow_implicit_invocation: false
